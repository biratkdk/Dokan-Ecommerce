databases:
  - name: redstore-db
    plan: free
    databaseName: redstore
    user: redstore

services:
  - type: web
    name: redstore
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "python -m gunicorn redstore.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.8"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: redstore-db
          property: connectionString
      - key: SUPPORT_CONTACT_EMAIL
        value: "biratkhadka6@gmail.com"
      - key: DJANGO_DEFAULT_FROM_EMAIL
        value: "Redstore Support <biratkhadka6@gmail.com>"
      - key: DJANGO_EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: STRIPE_CURRENCY
        value: "usd"
