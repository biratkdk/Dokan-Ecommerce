{% extends "base.html" %}

{% block title %}Password Updated | Redstore{% endblock %}

{% block content %}

        <div class="auth-card">
            <h2>Password Updated</h2>
            <p class="auth-copy">The password has been changed successfully. You can now sign in again with the new credentials.</p>
            <p class="auth-footer"><a href="{% url 'store:login' %}">Go to login</a></p>
        </div>
    </section>
{% endblock %}
