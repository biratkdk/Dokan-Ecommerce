<!DOCTYPE html>
<html>
<body style="font-family: -apple-system, Helvetica, Arial, sans-serif; color: #111827; background: #f8fafc; padding: 24px;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">
                <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background: #ffffff; border-radius: 16px; padding: 32px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);">
                    <tr>
                        <td>
                            <h2 style="margin: 0 0 16px; color: #111827;">Verify your Redstore account email</h2>
                            <p style="margin: 0 0 20px; line-height: 1.6; color: #475467;">
                                Hello {{ user.username }},<br><br>
                                Enter this code on your account dashboard to verify your email address.
                            </p>
                            <p style="text-align: center; margin: 28px 0;">
                                <span style="display: inline-block; background: #fff1ed; color: #e13f2a; font-weight: 700; font-size: 32px; letter-spacing: 8px; padding: 16px 24px; border-radius: 12px;">
                                    {{ code }}
                                </span>
                            </p>
                            <p style="margin: 20px 0 0; font-size: 13px; color: #667085;">
                                This code expires in 10 minutes. If you did not request it, you can ignore this message.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
